<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>500 - Erro Interno</title>
    <style>
        body {
            background: #0a0e27;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container h1 {
            font-size: 120px;
            margin: 0;
            color: #ff1744;
            text-shadow: 0 0 30px rgba(255,23,68,0.5);
        }
        .error-container p {
            color: #8b9bb4;
            font-size: 18px;
            margin: 20px 0;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <p>Erro interno do servidor</p>
        <a href="/" class="btn-back">Voltar ao Dashboard</a>
    </div>
</body>
</html>
