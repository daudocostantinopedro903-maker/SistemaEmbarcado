<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Sistema Embarcado - UniRovuma</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 230, 118, 0.02) 0%, transparent 50%);
            animation: bgMove 30s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -5%); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 50%; top: 10%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 70%; top: 60%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-100px) scale(1.5); opacity: 0.8; }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .login-card {
            background: rgba(17, 25, 54, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(0, 212, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #00e676, #00d4ff);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.3);
        }

        .logo-icon::after {
            content: '🏫';
            font-size: 30px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .brand-title {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #8b9bb4;
        }

        .uni-info {
            text-align: center;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .uni-info h4 {
            color: #00d4ff;
            font-size: 12px;
            font-weight: 600;
        }

        .uni-info span {
            color: #5a6a8a;
            font-size: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-wrapper {
            margin-bottom: 15px;
        }

        .input-wrapper label {
            display: block;
            color: #5a6a8a;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input[type="password"] {
            background: #e8ecf4;
            color: #0a0e27;
            border-color: transparent;
        }

        .input-wrapper input::placeholder {
            color: #5a6a8a;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
        }

        .input-wrapper select option {
            background: #0a0e27;
            color: #fff;
        }

        .btn-entrar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 12px;
            color: #0a0e27;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 212, 255, 0.4);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-footer a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: #fff;
        }

        .flash-messages {
            margin-bottom: 15px;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .alert-danger {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid rgba(255, 23, 68, 0.3);
            color: #ff1744;
        }

        .alert-success {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: #00e676;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <div class="logo-icon"></div>
                <h1 class="brand-title">UniRovuma</h1>
                <div class="brand-subtitle">Cadastro de Usuário</div>
            </div>

            <div class="uni-info">
                <h4>{{ universidade }}</h4>
                <span>{{ faculdade }}</span>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('cadastro') }}">
                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Nome Completo</label>
                        <input type="text" name="nome" placeholder="Nome completo" required>
                    </div>
                    <div class="input-wrapper">
                        <label>Tipo</label>
                        <select name="tipo" required>
                            <option value="operador">Operador</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Usuário</label>
                        <input type="text" name="username" placeholder="Nome de usuário" required>
                    </div>
                    <div class="input-wrapper">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="email@rovuma.ac.mz" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-wrapper">
                        <label>Senha</label>
                        <input type="password" name="password" placeholder="Mínimo 4 caracteres" required>
                    </div>
                    <div class="input-wrapper">
                        <label>Confirmar</label>
                        <input type="password" name="confirm_password" placeholder="Repita a senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-entrar">
                    <i class="fas fa-user-plus"></i> Cadastrar
                </button>
            </form>

            <div class="login-footer">
                <a href="{{ url_for('login') }}">
                    <i class="fas fa-arrow-left"></i> Voltar ao Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
